<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aadhaar Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="center-container">
    <h2>Aadhaar Verification</h2>
    <div id="aadhaar-step1">
      <input type="text" id="aadhaar" maxlength="12" placeholder="Aadhaar Number" class="input-field">
      <button class="main-btn" onclick="getOTP()">Get OTP</button>
    </div>
    <div id="aadhaar-step2" style="display:none">
      <input type="text" id="otpinput" maxlength="6" placeholder="Enter OTP" class="input-field">
      <button class="main-btn" onclick="validateOTP()">OK</button>
    </div>
  </main>
  <script>
    function getOTP() {
      const aadhaar = document.getElementById('aadhaar').value.trim();
      if(aadhaar.length === 12 && /^\d+$/.test(aadhaar)) {
        document.getElementById('aadhaar-step1').style.display = 'none';
        document.getElementById('aadhaar-step2').style.display = 'block';
      } else {
        alert('Enter a valid 12-digit Aadhaar number');
      }
    }
    function validateOTP() {
      const otp = document.getElementById('otpinput').value.trim();
      if(otp.length === 6 && /^\d+$/.test(otp)) {
        location.href = 'votingpage.html';
      } else {
        alert('Enter a valid 6-digit OTP');
      }
    }
  </script>
</body>
</html>
